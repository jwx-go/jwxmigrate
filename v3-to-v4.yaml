      - 'undefined: jws.SplitCompactString'
      - 'undefined: jws.SplitCompactReader'
    note: >
      jws.SplitCompact, jws.SplitCompactString, and jws.SplitCompactReader are
      removed from the jws package. Use the equivalents in
      github.com/lestrrat-go/jwx/v4/jws/jwsbb — the signatures are unchanged,
      only the package moved.
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jws"
        hdr, pl, sig, err := jws.SplitCompact(buf)
      after: |
