  # ============================================================
  # jwt Package
  # ============================================================

  - id: jwt-token-claims-iterator
    kind: type_change
    package: jwt
    mechanical: false
    v3: "Token — no iterator methods"
    v4: "Token.Claims() iter.Seq2[string, any]"
    search_patterns:
      - '\b[A-Za-z_][A-Za-z0-9_]*\.Keys\(\)'
    note: >
      jwt.Token now has a Claims() method returning an iterator over all claims
      (standard and private). Use with range loops.
    example:
      before: |
        // No standard way to iterate all claims in v3
        // Typically used Get() for known fields
      after: |
        for name, value := range token.Claims() {
            fmt.Printf("%s: %v\n", name, value)
        }

  - id: jwt-validate-errors-structured
    kind: behavioral
    package: jwt
    mechanical: false
    v3: "jwt.Validate errors (sentinel-based)"
    v4: "jwt.Validate errors (structured, aggregated)"
    search_patterns:
      - 'jwt\.TokenExpiredError\(\)'
      - 'jwt\.TokenNotYetValidError\(\)'
      - 'jwt\.InvalidIssuedAtError\(\)'
      - 'errors\.Is\(.*jwt\.(TokenExpired|TokenNotYetValid|InvalidIssuedAt)Error'
    compiler_hints:
      - 'cannot call non-function jwt.TokenExpiredError'
      - 'cannot call non-function jwt.TokenNotYetValidError'
      - 'cannot call non-function jwt.InvalidIssuedAtError'
    note: >
      jwt.Validate() now collects ALL validation failures instead of stopping at
      the first one, and returns structured error types carrying the claim value,
      current time, and skew. TokenExpiredError / TokenNotYetValidError /
      InvalidIssuedAtError are now struct types (not functions returning sentinel
      errors). Use errors.As (or errors.AsType) to extract a typed error and read
      its fields. Use errors.Is with a zero-value struct literal to test identity.
      Code that matched on error strings or called TokenExpiredError() as a
      function must be rewritten.
    example:
      before: |
        if err := jwt.Validate(tok); err != nil {
            if errors.Is(err, jwt.TokenExpiredError()) {
                return fmt.Errorf("token expired")
            }
            return err
        }
      after: |
        if err := jwt.Validate(tok); err != nil {
            var expErr jwt.TokenExpiredError
            if errors.As(err, &expErr) {
                return fmt.Errorf("token expired at %s (now=%s)", expErr.Expiration, expErr.Now)
            }
            return err
        }

  - id: jwt-withstrictbase64encoding-default
    kind: behavioral
    package: jwt
    mechanical: false
    v3: "(no option — base64 decoding was lenient)"
    v4: "jwt.WithStrictBase64Encoding(bool) — default true"
    note: >
      v4 adds jwt.WithStrictBase64Encoding (default true), enforcing strict
      RFC-compliant base64url decoding during parse. Tokens produced by
      non-conformant providers that parsed fine under v3 may be rejected under
      v4 with base64 decoding errors. If you must accept such tokens, pass
      jwt.WithStrictBase64Encoding(false) to the parse call. No action is needed
      if your tokens come from a conformant producer.
    example:
      before: |
        tok, err := jwt.Parse(data)
      after: |
        // Only if you know the producer emits non-standard base64:
        tok, err := jwt.Parse(data, jwt.WithStrictBase64Encoding(false))

  # ============================================================
  # Extension Module Migrations
  # ============================================================

  - id: jwk-cache-extension
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: "Cache (jwk.NewCache, jwk.CachedSet, etc.)"
    extension_module: "github.com/jwx-go/jwkcache/v4"
    search_patterns:
      - 'jwk\.NewCache\('
      - 'jwk\.CachedSet\b'
      - 'jwk\.CachedFetcher\b'
    note: >
      The entire JWK caching subsystem (Cache, NewCache, CachedSet, NewCachedSet,
      CachedFetcher, NewCachedFetcher) moved to an extension module.
      API changed: NewCache takes (ctx, *httprc.Client), Register replaces
      cache.Register with refresh options, Get becomes Lookup.
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jwk"

        cache := jwk.NewCache(ctx)
        cache.Register(url, jwk.WithMinRefreshInterval(15*time.Minute))
        set, err := cache.Get(ctx, url)
      after: |
        import (
            "github.com/lestrrat-go/httprc/v3"
            "github.com/jwx-go/jwkcache/v4"
        )

        cache, err := jwkcache.NewCache(ctx, httprc.NewClient())
        cache.Register(ctx, url)
        set, err := cache.Lookup(ctx, url)

  # --- HTTP JWKS surface moved to jwkfetch ---
  #
  # Everything HTTP-touching in v3's jwk package (Fetch, Whitelist*, HTTP
  # options, the Fetcher interface shape, and the jws/jwt WithVerifyAuto
  # variadic options) moved out of core in v4. The target companion is
  # github.com/jwx-go/jwkfetch/v4, which supersedes both the v3 Fetch/Whitelist
  # surface and the v3 jwx-go/jwkcache companion. See MIGRATION.md Recipe 6.

  - id: jwk-fetch-moved
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: Fetch
    extension_module: "github.com/jwx-go/jwkfetch/v4"
    search_patterns:
      - 'jwk\.Fetch\('
    compiler_hints:
      - 'undefined: jwk.Fetch'
    note: >
      jwk.Fetch is removed from the core library. Use
      jwkfetch.NewClient(opts...).Fetch(ctx, url) from
      github.com/jwx-go/jwkfetch/v4. Non-mechanical because every call site
      must be reshaped: construct a jwkfetch.Client once, then call Fetch on
      it. The default is permissive (every URL allowed), matching v3's
      jwk.Fetch behavior for trusted, hard-coded URLs; jku-style verification
      must add an explicit jwkfetch.WithWhitelist — see jws-withverifyauto-signature.
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jwk"

        set, err := jwk.Fetch(ctx, url, jwk.WithHTTPClient(httpClient))
      after: |
        import "github.com/jwx-go/jwkfetch/v4"

        client := jwkfetch.NewClient(jwkfetch.WithHTTPClient(httpClient))
        set, err := client.Fetch(ctx, url)

  - id: jwk-withhttpclient-moved
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: WithHTTPClient
    extension_module: "github.com/jwx-go/jwkfetch/v4"
    search_patterns:
      - 'jwk\.WithHTTPClient\('
    compiler_hints:
      - 'undefined: jwk.WithHTTPClient'
    note: >
      jwk.WithHTTPClient moved to jwkfetch.WithHTTPClient. The option only
      makes sense on a jwkfetch.Client / jwkfetch.Cache constructor, so the
      call site has to migrate to the new constructor together with this
      option — non-mechanical.

  - id: jwk-withfetchwhitelist-moved
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: WithFetchWhitelist
    extension_module: "github.com/jwx-go/jwkfetch/v4"
    search_patterns:
      - 'jwk\.WithFetchWhitelist\('
    compiler_hints:
      - 'undefined: jwk.WithFetchWhitelist'
    note: >
      jwk.WithFetchWhitelist(w) moved and renamed to jwkfetch.WithWhitelist(w)
      in github.com/jwx-go/jwkfetch/v4. Default behavior when no WithWhitelist
      is set is PERMISSIVE (matches v3 jwk.Fetch for trusted URLs). Callers
      migrating jws.WithVerifyAuto / jwt.WithVerifyAuto MUST add an explicit
      whitelist because v3's implicit deny-all wrapper is gone — see
      jws-withverifyauto-signature and MIGRATION.md Recipe 6.

  - id: jwk-withmaxfetchbodysize-moved
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: WithMaxFetchBodySize
    extension_module: "github.com/jwx-go/jwkfetch/v4"
    search_patterns:
      - 'jwk\.WithMaxFetchBodySize\('
    compiler_hints:
      - 'undefined: jwk.WithMaxFetchBodySize'
    note: >
      jwk.WithMaxFetchBodySize(n) moved and renamed to
      jwkfetch.WithMaxBodySize(n) in github.com/jwx-go/jwkfetch/v4.

  - id: jwk-whitelist-types-moved
    kind: moved_to_extension
    package: jwk
    mechanical: false
    v3: "Whitelist (InsecureWhitelist, MapWhitelist, RegexpWhitelist, WhitelistFunc, WhitelistError)"
    extension_module: "github.com/jwx-go/jwkfetch/v4"
    search_patterns:
      - 'jwk\.InsecureWhitelist\b'
      - 'jwk\.MapWhitelist\b'
      - 'jwk\.NewMapWhitelist\('
      - 'jwk\.RegexpWhitelist\b'
      - 'jwk\.WhitelistFunc\b'
      - 'jwk\.WhitelistError\('
    compiler_hints:
      - 'undefined: jwk.InsecureWhitelist'
      - 'undefined: jwk.MapWhitelist'
      - 'undefined: jwk.NewMapWhitelist'
      - 'undefined: jwk.RegexpWhitelist'
      - 'undefined: jwk.WhitelistFunc'
      - 'undefined: jwk.WhitelistError'
    note: >
      The entire whitelist family (InsecureWhitelist, MapWhitelist,
      NewMapWhitelist, RegexpWhitelist, WhitelistFunc, WhitelistError) moved
      to github.com/jwx-go/jwkfetch/v4 with the same names. Pass them to
      jwkfetch.WithWhitelist when constructing a jwkfetch.Client.
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jwk"

        wl := jwk.NewMapWhitelist().Add("https://issuer.example/jwks.json")
        set, err := jwk.Fetch(ctx, url, jwk.WithFetchWhitelist(wl))
      after: |
        import "github.com/jwx-go/jwkfetch/v4"

        wl := jwkfetch.NewMapWhitelist().Add("https://issuer.example/jwks.json")
        client := jwkfetch.NewClient(jwkfetch.WithWhitelist(wl))
        set, err := client.Fetch(ctx, url)

  - id: jws-withverifyauto-signature
    kind: signature_change
    package: jws
    mechanical: false
    v3: WithVerifyAuto
    v4: WithVerifyAuto
    v3_signature: "WithVerifyAuto(f jwk.Fetcher, opts ...jwk.FetchOption) VerifyOption"
    v4_signature: "WithVerifyAuto(f jwk.Fetcher) VerifyOption"
    search_patterns:
      - 'jws\.WithVerifyAuto\('
    compiler_hints:
      - 'too many arguments in call to jws.WithVerifyAuto'
    note: >
      SECURITY-RELEVANT. The variadic jwk.FetchOption tail is dropped. v3's
      implicit deny-all whitelist wrapper is gone: jws.WithVerifyAuto(nil, ...)
      no longer silently uses jwk.Fetch — it errors at verification time.
      Construct a jwkfetch.Client with an explicit jwkfetch.WithWhitelist and
      pass it as the sole argument. This is the SSRF protection for jku-style
      verification; see MIGRATION.md Recipe 6 "Security note for jku callers".
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jws"

        wl := jwk.NewMapWhitelist().Add("https://issuer.example/jwks.json")
        _, err := jws.Verify(signed,
            jws.WithVerifyAuto(nil, jwk.WithFetchWhitelist(wl)))
      after: |
        import (
            "github.com/jwx-go/jwkfetch/v4"
            "github.com/lestrrat-go/jwx/v4/jws"
        )

        client := jwkfetch.NewClient(
            jwkfetch.WithWhitelist(
                jwkfetch.NewMapWhitelist().Add("https://issuer.example/jwks.json"),
            ),
        )
        _, err := jws.Verify(signed, jws.WithVerifyAuto(client))

  - id: jwt-withverifyauto-signature
    kind: signature_change
    package: jwt
    mechanical: false
    v3: WithVerifyAuto
    v4: WithVerifyAuto
    v3_signature: "WithVerifyAuto(f jwk.Fetcher, opts ...jwk.FetchOption) ParseOption"
    v4_signature: "WithVerifyAuto(f jwk.Fetcher) ParseOption"
    search_patterns:
      - 'jwt\.WithVerifyAuto\('
    compiler_hints:
      - 'too many arguments in call to jwt.WithVerifyAuto'
    note: >
      SECURITY-RELEVANT. Same change as jws-withverifyauto-signature: variadic
      jwk.FetchOption tail dropped, nil fetcher now errors at verification
      time instead of silently using jwk.Fetch. Construct a jwkfetch.Client
      with an explicit jwkfetch.WithWhitelist and pass it as the sole argument.
      See jws-withverifyauto-signature for the full SSRF discussion.

  - id: jwk-fetcher-interface-shape-change
    kind: type_change
    package: jwk
    mechanical: false
    v3: Fetcher
    v4: Fetcher
    v3_signature: "Fetch(ctx context.Context, url string, options ...FetchOption) (Set, error)"
    v4_signature: "Fetch(ctx context.Context, url string) (Set, error)"
    search_patterns:
      - 'jwk\.Fetcher\b'
    compiler_hints:
      - 'does not implement jwk.Fetcher'
      - 'wrong type for method Fetch'
    note: >
      The jwk.Fetcher interface keeps its name but drops the variadic
      FetchOption tail. Third-party implementations must update their Fetch
      method to the new two-argument signature. jwkfetch.Client and
      jwkfetch.Cache from github.com/jwx-go/jwkfetch/v4 both satisfy the new
      shape out of the box.

  - id: asmbase64-extension
    kind: moved_to_extension
    package: jwx
    mechanical: true
    v3: "Assembly-optimized base64 (build tag jwx_asmbase64)"
    extension_module: "github.com/jwx-go/asmbase64/v4"
    search_patterns:
      - 'asmbase64'
    note: >
      Assembly base64 is no longer a build tag. Add a blank import of the
      extension module; its init() registers the assembly encoder/decoder
      with jwx. No Register() call exists — the module is side-effect only.
    example:
      before: |
        // Build with: go build -tags=jwx_asmbase64
      after: |
        import _ "github.com/jwx-go/asmbase64/v4"

  # ============================================================
  # Dependency Changes
  # ============================================================

  - id: dep-blackmagic-removed
    kind: removed
    package: jwx
    mechanical: true
    v3: "github.com/lestrrat-go/blackmagic"
    search_patterns:
      - 'lestrrat-go/blackmagic'
    file_patterns:
      - "go.mod"
    note: >
      The blackmagic dependency (reflect-based type assignment) is removed.
      v4 uses generics instead. No user action needed unless you imported
      blackmagic directly for jwx interop.

  - id: dep-goccy-removed
    kind: removed
    package: jwx
    mechanical: true
    v3: "github.com/goccy/go-json"
    search_patterns:
      - 'goccy/go-json'
    file_patterns:
      - "go.mod"
    note: >
      The goccy/go-json dependency is removed. v4 uses encoding/json/v2
      (GOEXPERIMENT=jsonv2). No user action needed unless you relied on
      goccy-specific JSON behavior.

  - id: dep-segmentio-removed
    kind: removed
    package: jwx
    mechanical: true
    v3: "github.com/segmentio/asm"
    search_patterns:
      - 'segmentio/asm'
    file_patterns:
      - "go.mod"
    note: >
      The segmentio/asm dependency (assembly base64) is removed from core.
      Use github.com/jwx-go/asmbase64/v4 extension module if needed.

  - id: dep-option-v2-to-v3
    kind: import_change
    package: jwx
    mechanical: false
    v3: "github.com/lestrrat-go/option/v2"
    v4: "github.com/lestrrat-go/option/v3"
    search_patterns:
      - 'lestrrat-go/option/v2'
      - '\.Value\(\)\.\('
    file_patterns:
      - "go.mod"
    note: >
      The option library upgraded from v2 to v3, which uses generics. This
      affects any user who directly imported lestrrat-go/option for custom
      option types that interop with jwx options. Beyond the import path
      change, the API for retrieving option values changed: v2 used
      `opt.Value().(T)` (type assertion on any), v3 uses the generic helper
      `option.MustGet[T](opt)`. Code with custom option types must update
      both the import AND every value-retrieval site — the import rewrite
      alone will not compile.
    example:
      before: |
        import "github.com/lestrrat-go/option/v2"

        func handle(opt option.Interface) {
            v := opt.Value().(int)
            _ = v
        }
      after: |
        import "github.com/lestrrat-go/option/v3"

        func handle(opt option.Interface) {
            v := option.MustGet[int](opt)
            _ = v
        }
