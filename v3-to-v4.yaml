# jwx v3 → v4 Migration Rules
#
# Machine-readable migration map for AI coding agents.
# Schema: see schema.yaml in this directory.
#
# Source: github.com/lestrrat-go/jwx/v3 → github.com/lestrrat-go/jwx/v4

schema_version: "2"
from: "github.com/lestrrat-go/jwx/v3"
to: "github.com/lestrrat-go/jwx/v4"

rules:

  # ============================================================
  # Module & Build Changes
  # ============================================================

  - id: import-v3-to-v4
    kind: import_change
    package: all
    mechanical: true
    v3: "github.com/lestrrat-go/jwx/v3"
    v4: "github.com/lestrrat-go/jwx/v4"
    search_patterns:
      - 'lestrrat-go/jwx/v3'
    compiler_hints:
      - 'no required module provides package github.com/lestrrat-go/jwx/v3'
    note: >
      Update all import paths from v3 to v4.
      This applies to every subpackage: jwk, jws, jwe, jwt, jwt/openid, jwa, transform.
    example:
      before: |
        import "github.com/lestrrat-go/jwx/v3/jwt"
      after: |
        import "github.com/lestrrat-go/jwx/v4/jwt"

  - id: build-go-version
    kind: build_change
    package: all
    mechanical: true
    search_patterns:
      - '^go 1\.(?:1\d|2[0-5])(?:\.\d+)?\s*$'
    file_patterns:
      - "go.mod"
    note: >
      Go version requirement changed from 1.25.0 to 1.26.0.
      Build requires GOEXPERIMENT=jsonv2 environment variable.
      Update go.mod and build scripts accordingly.
      The search pattern only matches pre-migration `go` directives (1.25 and
      below) so it will not fire on already-migrated go.mod files.

  - id: build-tag-goccy
    kind: build_change
    package: all
    mechanical: true
    v3: "-tags=jwx_goccy"
    search_patterns:
      - 'jwx_goccy'
    file_patterns:
      - "Makefile"
      - "*.sh"
      - "*.yml"
      - "*.yaml"
      - "Dockerfile"
    compiler_hints:
      - 'build constraints exclude all Go files'
    note: >
      The jwx_goccy build tag is removed. v4 uses encoding/json/v2 (via GOEXPERIMENT=jsonv2)
      exclusively. Remove -tags=jwx_goccy from all build and test commands.

  - id: build-tag-asmbase64
    kind: build_change
    package: all
    mechanical: true
    v3: "-tags=jwx_asmbase64"
    search_patterns:
      - 'jwx_asmbase64'
    file_patterns:
      - "Makefile"
      - "*.sh"
      - "*.yml"
      - "*.yaml"
      - "Dockerfile"
    note: >
      The jwx_asmbase64 build tag is removed. For assembly-optimized base64, use the
      extension module github.com/jwx-go/asmbase64/v4 instead.

  - id: build-tag-es256k
    kind: build_change
    package: all
    mechanical: true
    v3: "-tags=jwx_es256k"
    search_patterns:
      - 'jwx_es256k'
    file_patterns:
      - "Makefile"
      - "*.sh"
      - "*.yml"
      - "*.yaml"
      - "Dockerfile"
    note: >
      The jwx_es256k build tag is removed. For ES256K/secp256k1 support, use the
      extension module github.com/jwx-go/es256k/v4 instead.

  - id: build-tag-secp256k1-pem
    kind: build_change
    package: all
    mechanical: true
    v3: "-tags=jwx_secp256k1_pem"
    search_patterns:
      - 'jwx_secp256k1_pem'
    file_patterns:
      - "Makefile"
      - "*.sh"
      - "*.yml"
      - "*.yaml"
      - "Dockerfile"
    note: >
      The jwx_secp256k1_pem build tag is removed. PEM support for secp256k1 keys
      is included in github.com/jwx-go/es256k/v4.

  # ============================================================
  # Root Package (jwx)
  # ============================================================

  - id: rename-decodersettings-to-settings
    kind: rename
    package: jwx
    mechanical: true
    v3: DecoderSettings
    v4: Settings
    search_patterns:
      - 'jwx\.DecoderSettings\('
    compiler_hints:
      - 'undefined: jwx.DecoderSettings'
    note: >
      jwx.DecoderSettings() is renamed to jwx.Settings(). The function signature
      is unchanged — it still accepts global options like jwx.WithUseNumber(),
      which continues to exist. This is a straightforward rename.
    example:
      before: |
        jwx.DecoderSettings(jwx.WithUseNumber(true))
      after: |
        jwx.Settings(jwx.WithUseNumber(true))

  # ============================================================
  # All Packages — Interface Method Changes
  # ============================================================

  - id: get-to-field
    kind: signature_change
    package: all
    mechanical: false
    v3: Get
    v4: Field
    v3_signature: "Get(name string, dst any) error"
    v4_signature: "Field(name string) (any, bool)"
    search_patterns:
      - '\.Get\('
    compiler_hints:
      - 'too many arguments in call to'
      - '.Get undefined'
    note: >
      Replace Get(name, &dst) with the generic free function Get[T](obj, name)
      in the respective package (jwk, jwt, jws, jwe). Alternatively, use
      Field(name) which returns (any, bool).
    example:
      before: |
        var kid string
        if err := key.Get("kid", &kid); err != nil {
            return err
        }
      after: |
        kid, err := jwk.Get[string](key, "kid")

  - id: register-custom-field-generic
    kind: signature_change
    package: all
    mechanical: true
    v3: RegisterCustomField
    v4: RegisterCustomField
    v3_signature: "RegisterCustomField(name string, object any)"
    v4_signature: "RegisterCustomField[T any](name string)"
    search_patterns:
      - 'RegisterCustomField\('
    compiler_hints:
      - 'too many arguments in call to'
    note: >
      RegisterCustomField now uses a type parameter instead of a sample object.
      This applies to jwk, jws, jwe, and jwt packages.
    example:
      before: |
        jwt.RegisterCustomField("my-field", time.Time{})
      after: |
        jwt.RegisterCustomField[time.Time]("my-field")

  - id: register-custom-decoder-generic
    kind: signature_change
    package: all
    mechanical: false
    v3: RegisterCustomDecoder
    v4: RegisterCustomDecoder
    v3_signature: "RegisterCustomDecoder(name string, dec CustomDecoder)"
    v4_signature: "RegisterCustomDecoder[T any](name string, dec CustomDecodeFunc[T])"
    search_patterns:
      - 'RegisterCustomDecoder\('
    compiler_hints:
      - 'cannot use .* as jwk.CustomDecodeFunc'
      - 'cannot use .* as jwt.CustomDecodeFunc'
      - 'cannot use .* as jws.CustomDecodeFunc'
      - 'cannot use .* as jwe.CustomDecodeFunc'
      - 'not enough type arguments for'
    note: >
      RegisterCustomDecoder is now generic, matching RegisterCustomField.
      Supply the decoded type as a type parameter and pass a CustomDecodeFunc[T]
      instead of the old CustomDecoder interface. Applies to jwk, jws, jwe,
      jwt, and jwt/openid.
    example:
      before: |
        jwt.RegisterCustomDecoder("my-field", myDecoderImpl{})
      after: |
        jwt.RegisterCustomDecoder[time.Time]("my-field", func(data []byte) (time.Time, error) {
            // decode data into a time.Time
        })

  # ============================================================
  # All Packages — File I/O
  # ============================================================

  - id: readfile-to-parsefs
    kind: signature_change
    package: all
    mechanical: true
    v3: ReadFile
    v4: ParseFS
    v3_signature: "ReadFile(path string, options ...ReadFileOption) (T, error)"
    v4_signature: "ParseFS(fsys fs.FS, path string, options ...ParseOption) (T, error)"
    search_patterns:
      - 'ReadFile\('
    compiler_hints:
      - 'undefined: jwt.ReadFile'
      - 'undefined: jwk.ReadFile'
      - 'undefined: jws.ReadFile'
      - 'undefined: jwe.ReadFile'
    note: >
      ReadFile() is replaced by ParseFS() which takes an fs.FS argument.
      Use os.DirFS() to get a filesystem rooted at a directory.
      The ReadFileOption interface is removed; use ParseOption instead.
      This applies to jwk, jws, jwe, and jwt packages.
    example:
      before: |
        token, err := jwt.ReadFile("/path/to/token.jwt")
        // or with a custom filesystem:
        token, err := jwt.ReadFile("token.jwt", jwt.WithFS(myFS))
      after: |
        token, err := jwt.ParseFS(os.DirFS("/path/to"), "token.jwt")
        // or with a custom filesystem:
        token, err := jwt.ParseFS(myFS, "token.jwt")

  - id: remove-readfileoption
    kind: removed
    package: all
    mechanical: true
    v3: ReadFileOption
    replacement: ParseOption
    search_patterns:
      - 'ReadFileOption'
    compiler_hints:
      - 'undefined: jwt.ReadFileOption'
      - 'undefined: jwk.ReadFileOption'
    note: >
      The ReadFileOption interface is removed. Functions that accepted ReadFileOption
      now accept ParseOption. This applies to jwk, jws, jwe, and jwt packages.

  - id: remove-withfs
    kind: removed
    package: all
    mechanical: true
    v3: WithFS
    search_patterns:
      - 'WithFS\('
    compiler_hints:
      - 'undefined: jwt.WithFS'
      - 'undefined: jwk.WithFS'
    note: >
      The WithFS() option is removed. Pass the fs.FS directly to ParseFS() as the
      first argument instead.

  # ============================================================
  # jwk Package
  # ============================================================

  - id: jwk-import-generic
    kind: signature_change
    package: jwk
    mechanical: false
    v3: Import
    v4: Import
    v3_signature: "Import(raw any) (Key, error)"
    v4_signature: "Import[T Key](raw any) (T, error)"
    search_patterns:
      - 'jwk\.Import\('
    compiler_hints:
      - 'cannot use .* as jwk.Key'
      - 'not enough type arguments for jwk.Import'
    note: >
      jwk.Import() now takes a type parameter specifying the expected key type.
      If you previously type-asserted the result, use that type as T.
      Use jwk.Key as T if you don't know the concrete type.
    example:
      before: |
        key, err := jwk.Import(rsaPrivKey)
        rsaKey, ok := key.(jwk.RSAPrivateKey)
        if !ok {
            return errors.New("unexpected key type")
        }
      after: |
        rsaKey, err := jwk.Import[jwk.RSAPrivateKey](rsaPrivKey)
        if err != nil {
            return err // includes type mismatch errors
        }

  - id: jwk-parsekey-generic
    kind: signature_change
    package: jwk
    mechanical: false
    v3: ParseKey
    v4: ParseKey
    v3_signature: "ParseKey(data []byte, options ...ParseOption) (Key, error)"
    v4_signature: "ParseKey[T Key](data []byte, options ...ParseOption) (T, error)"
    search_patterns:
      - 'jwk\.ParseKey\('
    compiler_hints:
      - 'not enough type arguments for jwk.ParseKey'
    note: >
      jwk.ParseKey() now takes a type parameter. Use the concrete key type if known,
      or jwk.Key if not.
    example:
      before: |
        key, err := jwk.ParseKey(data)
        ecKey, ok := key.(jwk.ECDSAPublicKey)
      after: |
        ecKey, err := jwk.ParseKey[jwk.ECDSAPublicKey](data)

  - id: jwk-register-key-importer
    kind: signature_change
    package: jwk
    mechanical: false
    v3: RegisterKeyImporter
    v4: RegisterKeyImporter
    v3_signature: "RegisterKeyImporter(from any, conv KeyImporter)"
    v4_signature: "RegisterKeyImporter[T any](fn func(T) (Key, error))"
    search_patterns:
      - 'RegisterKeyImporter\('
    compiler_hints:
      - 'too many arguments in call to jwk.RegisterKeyImporter'
    note: >
      RegisterKeyImporter now uses a generic type parameter instead of a dummy value
      for type dispatch. The KeyImporter interface is replaced by a plain function.
    example:
      before: |
        jwk.RegisterKeyImporter(&myKeyType{}, jwk.KeyImportFunc(func(raw any) (jwk.Key, error) {
            src, ok := raw.(*myKeyType)
            if !ok {
                return nil, errors.New("unexpected type")
            }
            // convert src to JWK
        }))
      after: |
        jwk.RegisterKeyImporter(func(src *myKeyType) (jwk.Key, error) {
            // convert src to JWK — no type assertion needed
        })

  - id: jwk-cache-removed
    kind: removed
    package: jwk
    mechanical: false
    v3: Cache
    replacement: "github.com/jwx-go/jwkcache/v4"
    search_patterns:
      - 'jwk\.NewCache\('
      - 'jwk\.Cache\b'
      - 'jwk\.CachedSet\b'
      - 'jwk\.NewCachedSet\('
      - 'jwk\.CachedFetcher\b'
      - 'jwk\.NewCachedFetcher\('
    compiler_hints:
      - 'undefined: jwk.Cache'
      - 'undefined: jwk.NewCache'
      - 'undefined: jwk.CachedSet'
      - 'undefined: jwk.NewCachedSet'
      - 'undefined: jwk.CachedFetcher'
      - 'undefined: jwk.NewCachedFetcher'
    note: >
      jwk.Cache, jwk.NewCache, jwk.CachedSet, jwk.NewCachedSet, jwk.CachedFetcher,
      and jwk.NewCachedFetcher are all removed from the core library.
      Use the extension module github.com/jwx-go/jwkcache/v4 instead.
      The new API uses jwkcache.NewCache(), c.Register(), and c.Lookup().
    example:
      before: |
        import (
            "github.com/lestrrat-go/httprc/v3"
            "github.com/lestrrat-go/jwx/v3/jwk"
        )

        cache, err := jwk.NewCache(ctx, httprc.NewClient())
        cache.Register(ctx, url, jwk.WithMinRefreshInterval(15*time.Minute))
        set, err := cache.Lookup(ctx, url)
      after: |
        import (
            "github.com/lestrrat-go/httprc/v3"
            "github.com/jwx-go/jwkcache/v4"
        )

        cache, err := jwkcache.NewCache(ctx, httprc.NewClient())
        cache.Register(ctx, url)
        set, err := cache.Lookup(ctx, url)

  - id: jwk-cacheoption-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: CacheOption
    search_patterns:
      - 'CacheOption\b'
    compiler_hints:
      - 'undefined: jwk.CacheOption'
    note: >
      CacheOption interface removed. Use jwkcache options from
      github.com/jwx-go/jwkcache/v4 instead.

  - id: jwk-resourceoption-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: ResourceOption
    search_patterns:
      - 'ResourceOption\b'
    compiler_hints:
      - 'undefined: jwk.ResourceOption'
    note: ResourceOption interface removed along with the caching subsystem.

  - id: jwk-registeroption-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: RegisterOption
    search_patterns:
      - 'RegisterOption\b'
    compiler_hints:
      - 'undefined: jwk.RegisterOption'
    note: RegisterOption interface removed along with the caching subsystem.

  - id: jwk-registerfetchoption-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: RegisterFetchOption
    search_patterns:
      - 'RegisterFetchOption\b'
    compiler_hints:
      - 'undefined: jwk.RegisterFetchOption'
    note: >
      RegisterFetchOption interface removed along with the caching subsystem.
      Fetch-side configuration now lives on jwkfetch.Client options
      (jwkfetch.WithHTTPClient, jwkfetch.WithWhitelist, jwkfetch.WithMaxBodySize)
      in github.com/jwx-go/jwkfetch/v4.

  - id: jwk-withhttprcresourceoption-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: WithHttprcResourceOption
    search_patterns:
      - 'WithHttprcResourceOption\('
    compiler_hints:
      - 'undefined: jwk.WithHttprcResourceOption'
    note: >
      Removed along with the caching subsystem. Configure via jwkfetch.Client /
      jwkfetch.Cache from github.com/jwx-go/jwkfetch/v4, which supersedes both
      the v3 jwk.Fetch / jwk.Whitelist surface and the jwx-go/jwkcache companion.

  - id: jwk-withconstantinterval-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: WithConstantInterval
    search_patterns:
      - 'WithConstantInterval\('
    compiler_hints:
      - 'undefined: jwk.WithConstantInterval'
    note: Removed along with the caching subsystem. Configure refresh intervals via httprc directly.

  - id: jwk-withmininterval-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: WithMinInterval
    search_patterns:
      - 'WithMinInterval\('
    compiler_hints:
      - 'undefined: jwk.WithMinInterval'
    note: Removed along with the caching subsystem.

  - id: jwk-withmaxinterval-removed
    kind: removed
    package: jwk
    mechanical: true
    v3: WithMaxInterval
    search_patterns:
      - 'WithMaxInterval\('
    compiler_hints:
      - 'undefined: jwk.WithMaxInterval'
    note: Removed along with the caching subsystem.

  - id: jwk-set-iterator
    kind: type_change
    package: jwk
    mechanical: false
    v3: "Set — no iterator methods"
    v4: "Set.All() iter.Seq2[int, Key], Set.Fields() iter.Seq2[string, any]"
    search_patterns:
      - 'set\.Len\(\)'
      - '\.Key\([A-Za-z0-9_]+\)'
    note: >
      jwk.Set now supports Go iterators. Use range loops with All() for keys
      and Fields() for private parameters.
    example:
      before: |
        for i := 0; i < set.Len(); i++ {
            key, ok := set.Key(i)
            if !ok {
                continue
            }
            // use key
        }
      after: |
        for _, key := range set.All() {
            // use key
        }

  - id: jwk-keyimporter-type-removed
    kind: type_change
    package: jwk
    mechanical: false
    v3: "KeyImporter"
    search_patterns:
      - 'KeyImporter\b'
      - 'KeyImportFunc\('
    compiler_hints:
      - 'undefined: jwk.KeyImporter'
      - 'undefined: jwk.KeyImportFunc'
    note: >
      The KeyImporter interface and the KeyImportFunc constructor are both
      removed. There is no 1:1 type replacement: in v4 the importer is just
      a plain generic function `func(T) (jwk.Key, error)` passed directly to
      jwk.RegisterKeyImporter[T]. Migrate call sites manually; see the
      jwk-register-key-importer rule.

  - id: jwk-registerprobefield-generic
    kind: signature_change
    package: jwk
    mechanical: false
    v3: RegisterProbeField
    v4: RegisterProbeField
    v3_signature: "RegisterProbeField(field reflect.StructField) error"
    v4_signature: "RegisterProbeField[T any](name, jsonKey string) error"
    search_patterns:
      - 'jwk\.RegisterProbeField\('
    compiler_hints:
      - 'cannot use reflect.StructField'
      - 'not enough type arguments for jwk.RegisterProbeField'
    note: >
      jwk.RegisterProbeField changed from a reflect.StructField-based API to a
      generic one. Supply the expected value type as T, and pass the Go field
      name and JSON key as plain strings. Drop the `reflect` import if it is
      no longer used.
    example:
      before: |
        jwk.RegisterProbeField(reflect.StructField{
            Name: "MyHint",
            Type: reflect.TypeOf(""),
            Tag:  `json:"my_hint"`,
        })
      after: |
        jwk.RegisterProbeField[string]("MyHint", "my_hint")

  - id: jwk-export-generic
    kind: signature_change
    package: jwk
    mechanical: false
    v3: Export
    v4: Export
    v3_signature: "Export(key Key, dst any) error"
    v4_signature: "Export[T any](key Key) (T, error)"
    search_patterns:
      - 'jwk\.Export\('
    compiler_hints:
      - 'not enough type arguments for jwk.Export'
      - 'too many arguments in call to jwk.Export'
    note: >
      jwk.Export is now generic. Instead of passing an output pointer as the
      second argument, supply the expected raw key type as a type parameter
      and use the returned value directly.
    example:
      before: |
        var raw rsa.PrivateKey
        if err := jwk.Export(key, &raw); err != nil {
            return err
        }
      after: |
        raw, err := jwk.Export[*rsa.PrivateKey](key)
        if err != nil {
            return err
        }

  # ============================================================
  # jws Package
  # ============================================================

  - id: jws-signer2-to-signer
    kind: rename
    package: jws
    mechanical: true
    v3: Signer2
    v4: Signer
    search_patterns:
      - 'Signer2\b'
    compiler_hints:
      - 'undefined: jws.Signer2'
    note: >
      The Signer2 interface is renamed to Signer. The Algorithm() method is removed
      from the interface — implementations no longer need it.
      If you implemented Signer2, rename to Signer and remove the Algorithm() method.
    example:
      before: |
        type MySigner struct{}
        func (s MySigner) Algorithm() jwa.SignatureAlgorithm { return jwa.RS256() }
        func (s MySigner) Sign(key any, payload []byte) ([]byte, error) { ... }
        // implements jws.Signer2
      after: |
        type MySigner struct{}
        func (s MySigner) Sign(key any, payload []byte) ([]byte, error) { ... }
        // implements jws.Signer

  - id: jws-verifier2-to-verifier
    kind: rename
    package: jws
    mechanical: true
    v3: Verifier2
    v4: Verifier
    search_patterns:
      - 'Verifier2\b'
    compiler_hints:
      - 'undefined: jws.Verifier2'
    note: >
      The Verifier2 interface is renamed to Verifier.
      If you implemented Verifier2, rename to Verifier.

  - id: jws-register-signer
    kind: signature_change
    package: jws
    mechanical: true
    v3: RegisterSigner
    v4: RegisterSigner
    v3_signature: "RegisterSigner(alg jwa.SignatureAlgorithm, f any) error"
    v4_signature: "RegisterSigner(alg jwa.SignatureAlgorithm, s Signer) error"
    search_patterns:
      - 'RegisterSigner\('
    compiler_hints:
      - 'cannot use .* as jws.Signer'
    note: >
      RegisterSigner now requires a concrete Signer (formerly Signer2) instead of any.
      Remove type assertions or factory wrappers.
    example:
      before: |
        jws.RegisterSigner(jwa.EdDSA(), mySignerFactory)
      after: |
        jws.RegisterSigner(jwa.EdDSA(), MySigner{})

  - id: jws-register-verifier
    kind: signature_change
    package: jws
    mechanical: true
    v3: RegisterVerifier
    v4: RegisterVerifier
    v3_signature: "RegisterVerifier(alg jwa.SignatureAlgorithm, f any) error"
    v4_signature: "RegisterVerifier(alg jwa.SignatureAlgorithm, v Verifier) error"
    search_patterns:
      - 'RegisterVerifier\('
    compiler_hints:
      - 'cannot use .* as jws.Verifier'
    note: >
      RegisterVerifier now requires a concrete Verifier (formerly Verifier2) instead of any.

  - id: jws-signerfactory-removed
    kind: removed
    package: jws
    mechanical: true
    v3: SignerFactory
    search_patterns:
      - 'SignerFactory\b'
    compiler_hints:
      - 'undefined: jws.SignerFactory'
    note: SignerFactory interface removed. Pass Signer directly to RegisterSigner.

  - id: jws-signerfactoryfn-removed
    kind: removed
    package: jws
    mechanical: true
    v3: SignerFactoryFn
    search_patterns:
      - 'SignerFactoryFn\b'
    compiler_hints:
      - 'undefined: jws.SignerFactoryFn'
    note: SignerFactoryFn type removed. Pass Signer directly to RegisterSigner.

  - id: jws-signeradapter-removed
    kind: removed
    package: jws
    mechanical: true
    v3: SignerAdapter
    search_patterns:
      - 'SignerAdapter\b'
    compiler_hints:
      - 'undefined: jws.SignerAdapter'
    note: SignerAdapter removed. The legacy Signer compatibility layer is gone.

  - id: jws-verifierfactory-removed
    kind: removed
    package: jws
    mechanical: true
    v3: VerifierFactory
    search_patterns:
      - 'VerifierFactory\b'
    compiler_hints:
      - 'undefined: jws.VerifierFactory'
    note: VerifierFactory interface removed. Pass Verifier directly to RegisterVerifier.

  - id: jws-verifierfactoryfn-removed
    kind: removed
    package: jws
    mechanical: true
    v3: VerifierFactoryFn
    search_patterns:
      - 'VerifierFactoryFn\b'
    compiler_hints:
      - 'undefined: jws.VerifierFactoryFn'
    note: VerifierFactoryFn type removed. Pass Verifier directly to RegisterVerifier.

